<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Selecione seu perfil da Netflix para continuar assistindo.">
    <meta name="theme-color" content="#221f1f">
    <title>Seleção de Perfil - Netflix</title>
</head>

<body>
    <main>
        <header>
            <h1>Quem está assistindo?</h1>
        </header>

        <section class="profiles-container">
            <h2 class="sr-only">Perfis disponíveis</h2>
            <ul class="profiles" role="list">
                <li class="profile-item">
                    <figure class="profile">
                        <img src="assets/foto-perfil-1.jpg"
                            alt="Ilustração em estilo anime de Satoru Gojo, com cabelos brancos e venda nos olhos, fazendo um gesto com os dedos sob uma iluminação dramática em tons de roxo e violeta"
                            class="profile-image">
                        <figcaption class="profile-name">Perfil 1</figcaption>
                    </figure>
                </li>
                <li class="profile-item">
                    <figure class="profile">
                        <img src="assets/foto-perfil-2.jpg" alt="Ilustração de Sung Jin-woo, de Solo Leveling, com um olho brilhando em azul neon contra um fundo urbano noturno e desfocado" class="profile-image">
                        <figcaption class="profile-name">Perfil 2</figcaption>
                    </figure>
                </li>
                <li class="profile-item">
                    <figure class="profile">
                        <img src="assets/foto-perfil-3.jpg" alt="Ilustração em estilo anime de Ken Kaneki, de Tokyo Ghoul, vestindo um capuz escuro e sua icônica máscara de dentes, com um olho normal e o outro vermelho em destaque" class="profile-image">
                        <figcaption class="profile-name">Perfil 3</figcaption>
                    </figure>
                </li>
            </ul>
        </section>
    </main>
</body>

</html>
